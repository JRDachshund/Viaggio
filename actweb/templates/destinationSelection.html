<!DOCTYPE html>
<html>
<head>
    <title>Country Selection</title>
</head>
<body>

<h1>Select Countries</h1>

{% for country, neighbors in world_graph.items() %}

<div id="country-{{ country }}">

    <h2>{{ country }}</h2>

    <p>Connections: {{ neighbors|join(", ") }}</p>

    <button onclick="acceptCountry('{{ country }}')">Yes</button>
    <button onclick="rejectCountry('{{ country }}')">No</button>

</div>

{% endfor %}

<hr>

<a href="/citySelection">
    <button>Continue to Cities</button>
</a>

<script>

async function acceptCountry(country) {

    await fetch("/acceptCountry", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({country})
    });

    document.getElementById("country-" + country).remove();
}

async function rejectCountry(country) {

    await fetch("/rejectCountry", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({country})
    });

    document.getElementById("country-" + country).remove();
}

</script>

</body>
</html>
