<!DOCTYPE html>
<html>
<head>
    <title>City Selection</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        .country{
            background:white;
            margin-bottom:30px;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .cities{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
            margin-top:15px;
        }

        .city-card{
            width:180px;
            padding:15px;
            border:2px solid #ddd;
            border-radius:10px;
            cursor:pointer;
            transition:.2s;
            text-align:center;
            background:white;
        }

        .city-card:hover{
            border-color:#007bff;
        }

        .city-card.selected{
            background:#007bff;
            color:white;
            border-color:#007bff;
        }

        button{
            display:block;
            margin:40px auto;
            padding:12px 40px;
            font-size:18px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<h1>Select Cities</h1>

{% for country, city_list in cities.items() %}

<div class="country">

    <h2>{{ country }}</h2>

    <div class="cities">

        {% for city in city_list %}

        <div
            class="city-card"
            data-name="{{ city.name }}"
            data-code="{{ city.code }}"
        >

            <h3>{{ city.name }}</h3>

            <p>{{ city.code }}</p>

        </div>

        {% endfor %}

    </div>

</div>

{% endfor %}

<button id="continue">
    Continue
</button>

<script>

let selectedCities = [];

document.querySelectorAll(".city-card").forEach(card => {

    card.addEventListener("click", () => {

        card.classList.toggle("selected");

        const city = {
            name: card.dataset.name,
            code: card.dataset.code
        };

        if(card.classList.contains("selected")){

            selectedCities.push(city);

        }else{

            selectedCities = selectedCities.filter(c => c.code !== city.code);

        }

    });

});

document.getElementById("continue").addEventListener("click", async () => {

    await fetch("/saveCities",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(selectedCities)

    });

    window.location.href="/accommodationSelection";

});

</script>

</body>
</html>
